<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Edit Train</h1>
        <form th:action="@{/trains/save}" th:object="${train}" method="post" enctype="multipart/form-data">>
            <input type="hidden" id="trainId" class="form-control" th:field="*{trainId}" />

            <div class="mb-3">
                <label for="trainname" class="form-label">Train Name</label>
                <input type="text" id="trainname" class="form-control" th:field="*{trainName}" />
            </div>
            <div class="mb-3">
                <label for="traincode" class="form-label">Train Code</label>
                <input type="text" id="traincode" class="form-control" th:field="*{trainCode}" />
            </div>
            <div class="mb-3">
                <label for="Description" class="form-label">Train Description</label>
                <input type="text" id="Description" class="form-control" th:field="*{description}" />
            </div>
            <div class="mb-3">
                <label for="imageFile" class="form-label">Train Image</label>
                <input type="file" id="imageFile" name="imageFile" accept="image/png, image/jpeg" class="form-control" required>
            </div>


            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</body>

</html>
