<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Add Train</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h2 class="mb-4">Add New Train</h2>
        <form th:action="@{/trains/save}" th:object="${train}" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="trainID" class="form-label">ID:</label>
                <input type="text" id="trainId" th:field="*{trainId}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="trainName" class="form-label">Train Name:</label>
                <input type="text" id="trainName" th:field="*{trainName}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="trainCode" class="form-label">Train Code</label>
                <input type="text" id="trainCode" th:field="*{trainCode}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Train Description:</label>
                <input type="text" id="description" th:field="*{description}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Train Image:</label>
                <input type="file" name="imageFile" accept="image/png, image/jpeg" class="form-control" required>
            </div>
            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Add Train</button>
            </div>
        </form>
        <a th:href="@{/trains}" class="btn btn-secondary">Back to Train List</a>
    </div>
</body>
</html>
