<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Train List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Train List</h1>
        <a class="btn btn-outline-primary" href="#" th:href="@{/trains/newTrain}">New Train</a>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Train Code</th>
                    <th>Name</th>
                    <th>Image</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="train : ${listTrain}">
                    <td th:text="${train.trainId}"></td>
                    <td th:text="${train.trainCode}"></td>
                    <td th:text="${train.trainName}"></td>
                    <td><img th:src="@{${train.photosImagePath}}" width="115px"></td>
                    <td th:text="${train.getPhotosImagePath}"></td>
                    <td>
                        <a th:href="@{/trains/edit/{trainID}(trainID=${train.trainId})}" class="btn btn-primary btn-sm">Edit</a>
                        <a th:href="@{/trains/delete/{id}(id=${train.trainId})}" class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this train?');">Delete</a>
                    </td>

                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
