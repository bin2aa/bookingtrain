<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Edit Train</h1>
        <form th:action="@{/trains/save}" th:object="${train}" method="post">
            <input type="hidden" id="trainId" class="form-control" th:field="*{trainId}" />

            <div class="mb-3">
                <label for="username" class="form-label">Train Name</label>
                <input type="text" id="username" class="form-control" th:field="*{trainName}" />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Train Code</label>
                <input type="text" id="email" class="form-control" th:field="*{trainCode}" />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Train Image</label>
                <input type="text" id="email" class="form-control" th:field="*{image}" />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Train Description</label>
                <input type="text" id="email" class="form-control" th:field="*{description}" />
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</body>

</html>
